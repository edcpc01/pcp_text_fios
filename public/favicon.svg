<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fundo azul Doptex -->
  <rect width="64" height="64" rx="12" fill="#1553b5"/>

  <!-- D com traço italic Doptex, levemente menor para dar espaço à fábrica -->
  <text x="31" y="26" font-family="Georgia,'Times New Roman',serif"
        font-size="26" font-weight="700" font-style="italic"
        fill="white" text-anchor="middle" dominant-baseline="middle">D</text>

  <!-- Fábrica industrial (silhueta estilizada) -->
  <g transform="translate(32,52)" fill="none" stroke="white"
     stroke-linecap="round" stroke-linejoin="round">

    <!-- Base / corpo principal -->
    <rect x="-16" y="-10" width="32" height="11" rx="1.2"
          fill="#1553b5" stroke="white" stroke-width="1.5"/>

    <!-- Chaminé esquerda -->
    <rect x="-13" y="-20" width="6" height="11" rx="1"
          fill="#1553b5" stroke="white" stroke-width="1.3"/>

    <!-- Chaminé central (maior) -->
    <rect x="-3"  y="-25" width="6" height="16" rx="1"
          fill="#1553b5" stroke="white" stroke-width="1.3"/>

    <!-- Chaminé direita -->
    <rect x="7"   y="-17" width="6" height="8"  rx="1"
          fill="#1553b5" stroke="white" stroke-width="1.3"/>

    <!-- Janelas da fábrica -->
    <rect x="-12" y="-6" width="4" height="4" rx="0.6" fill="white" stroke="none"/>
    <rect x="-4"  y="-6" width="4" height="4" rx="0.6" fill="white" stroke="none"/>
    <rect x="4"   y="-6" width="4" height="4" rx="0.6" fill="white" stroke="none"/>
  </g>
</svg>
