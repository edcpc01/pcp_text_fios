<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background ciano Doptex -->
  <rect width="64" height="64" rx="12" fill="#22d3ee"/>

  <!-- D estilo Doptex — bold branco -->
  <text x="32" y="28" font-family="Georgia,'Times New Roman',serif" font-size="30" font-weight="700" font-style="italic" fill="white" text-anchor="middle" dominant-baseline="middle">D</text>

  <!-- Fábrica branca abaixo do D -->
  <g transform="translate(32,54)" fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6">
    <!-- Corpo principal -->
    <rect x="-15" y="-10" width="30" height="11" rx="1" fill="#22d3ee" stroke="white" stroke-width="1.4"/>
    <!-- Chaminé esquerda -->
    <rect x="-12" y="-18" width="5" height="9" rx="0.8" fill="#22d3ee" stroke="white" stroke-width="1.3"/>
    <!-- Chaminé central -->
    <rect x="-3" y="-22" width="5" height="13" rx="0.8" fill="#22d3ee" stroke="white" stroke-width="1.3"/>
    <!-- Chaminé direita -->
    <rect x="7" y="-16" width="5" height="7" rx="0.8" fill="#22d3ee" stroke="white" stroke-width="1.3"/>
    <!-- Janelas -->
    <rect x="-11" y="-6" width="4" height="4" rx="0.5" fill="white" stroke="none"/>
    <rect x="-3"  y="-6" width="4" height="4" rx="0.5" fill="white" stroke="none"/>
    <rect x="5"   y="-6" width="4" height="4" rx="0.5" fill="white" stroke="none"/>
  </g>
</svg>
