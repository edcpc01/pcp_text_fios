<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background azul Doptex -->
  <rect width="512" height="512" rx="96" fill="#003087"/>

  <!-- D estilo Doptex bold branco -->
  <text x="256" y="280" font-family="Arial Black,Arial,sans-serif" font-size="310" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="middle" letter-spacing="-8">D</text>

  <!-- Fábrica abaixo do D -->
  <g transform="translate(256,448)" fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round" stroke-width="12">
    <!-- Corpo principal -->
    <rect x="-105" y="-64" width="210" height="72" rx="8" fill="#003087" stroke="white" stroke-width="11"/>
    <!-- Chaminé esquerda -->
    <rect x="-88" y="-108" width="32" height="48" rx="6" fill="#003087" stroke="white" stroke-width="10"/>
    <!-- Chaminé central -->
    <rect x="-20" y="-122" width="32" height="62" rx="6" fill="#003087" stroke="white" stroke-width="10"/>
    <!-- Chaminé direita -->
    <rect x="48" y="-98" width="32" height="38" rx="6" fill="#003087" stroke="white" stroke-width="10"/>
    <!-- Janelas -->
    <rect x="-72" y="-44" width="24" height="24" rx="4" fill="white" stroke="none"/>
    <rect x="-24" y="-44" width="24" height="24" rx="4" fill="white" stroke="none"/>
    <rect x="24"  y="-44" width="24" height="24" rx="4" fill="white" stroke="none"/>
  </g>
</svg>
