<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0c1222" />
    <meta name="description" content="Doptex | Corradi — Planejamento de produção de fios texturizados" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PCP Fios" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" href="/favicon-32.png" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <title>Doptex | Planejamento de Produção</title>
    <script>
      // Garante a captura do evento de instalação do PWA o mais cedo possível
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.pwaDeferredPrompt = e;
        console.log('[PWA] beforeinstallprompt capturado globalmente');
      });
    </script>
  </head>
  <body style="background:#0c1222;color:#e2e8f0;margin:0;font-family:system-ui,sans-serif">
    <div id="root"></div>
    <noscript style="display:block;padding:24px;text-align:center">Este app precisa de JavaScript.</noscript>
    <script>
      // Auto-recovery: se o app não montar em 8s, mostra botão para limpar cache/SW
      window.__appMounted = false;
      setTimeout(function () {
        if (window.__appMounted) return;
        var root = document.getElementById('root');
        if (!root || root.childNodes.length > 0) return;
        root.innerHTML =
          '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center">' +
          '<div style="max-width:420px">' +
          '<div style="font-size:48px;margin-bottom:12px">⚠️</div>' +
          '<h1 style="font-size:18px;font-weight:700;margin:0 0 8px">Falha ao carregar o app</h1>' +
          '<p style="font-size:13px;color:#94a3b8;margin:0 0 16px">Cache desatualizado ou sem conexão.</p>' +
          '<button id="__nuke" style="padding:10px 20px;background:#06b6d4;color:#0c1222;border:0;border-radius:12px;font-weight:700;cursor:pointer;font-size:13px">Limpar cache e recarregar</button>' +
          '</div></div>';
        document.getElementById('__nuke').onclick = async function () {
          try {
            if ('serviceWorker' in navigator) {
              var regs = await navigator.serviceWorker.getRegistrations();
              await Promise.all(regs.map(function (r) { return r.unregister(); }));
            }
            if ('caches' in window) {
              var keys = await caches.keys();
              await Promise.all(keys.map(function (k) { return caches.delete(k); }));
            }
          } catch (_) {}
          location.replace(location.origin + '/?nocache=' + Date.now());
        };
      }, 8000);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
